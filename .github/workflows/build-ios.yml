name: Build iOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx cap add ios
      - run: npx cap sync ios

      - name: Install CocoaPods dependencies
        run: |
          if [ -f ios/App/Podfile ]; then
            cd ios/App && pod install
          fi

      - name: Debug workspace
        run: find ios -name "*.xcworkspace" -o -name "*.xcodeproj" | head -20

      - name: Build unsigned app for device
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/Payload/
          VERSION=${GITHUB_REF_NAME:-dev}
          cd build && zip -r ../xmpp-chat-${VERSION}.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: App.ipa
          path: xmpp-chat-*.ipa

      - name: Create or update release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: xmpp-chat-*.ipa
          generate_release_notes: true
